<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
    <title>Past Simple</title>
    <link rel="stylesheet" href="/styles/tokens.css" />
    <link rel="stylesheet" href="/styles/components.css" />
    <link rel="stylesheet" href="/styles/main-screen.css" />
  </head>
  <body>
    <!-- Header -->
    <header class="header">
      <button class="icon-btn icon-btn--ghost header__burger" type="button" aria-label="Меню" id="burger">
        <!-- Три отдельных rect'а вместо одного path: на hover top/bottom
             вытягиваются длиннее, middle сужается. См. icon-btn.css. -->
        <svg viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <rect class="burger-bar burger-bar--top" x="8" y="9"  width="16" height="2" rx="1"/>
          <rect class="burger-bar burger-bar--mid" x="8" y="15" width="16" height="2" rx="1"/>
          <rect class="burger-bar burger-bar--bot" x="8" y="21" width="16" height="2" rx="1"/>
        </svg>
      </button>
      <div class="header__timeline">
        <!-- Заполняется через js/timeline-mini.js (renderTimelineMini),
             focus обновляется на scroll и resize основного Timeflow. -->
        <div class="timeline-mini" id="timeline-mini"></div>
      </div>
      <button class="icon-btn icon-btn--ghost header__info" type="button" aria-label="О проекте">
        <!-- Точка над «i» вынесена отдельным circle, чтобы её можно было
             подпрыгивать на hover независимо от стержня. См. icon-btn.css. -->
        <svg viewBox="0 0 32 32" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path class="i-stem" d="M13 13C15.2091 13 17 14.7909 17 17V22H19C19.5523 22 20 22.4477 20 23C20 23.5523 19.5523 24 19 24H13C12.4477 24 12 23.5523 12 23C12 22.4477 12.4477 22 13 22H15V17C15 15.8954 14.1046 15 13 15C12.4477 15 12 14.5523 12 14C12 13.4477 12.4477 13 13 13Z"/>
          <circle class="i-dot" cx="15.5" cy="9.5" r="1.5"/>
        </svg>
      </button>
    </header>

    <main class="main-canvas">
      <!-- Sidebar (overlay поверх Header, fixed). Контент рендерится в JS — см. js/sidebar.js. -->
      <aside class="sidebar-overlay" id="sidebar"></aside>

      <!-- Canvas: Timeflow pane (без скролла) + Bottom bar (главный scroll + zoom).
           Scrollbar теперь живёт в самом низу экрана, под year-scale, а не
           между timeflow и year-scale (см. main-screen.css → .canvas__bottom-bar). -->
      <section class="canvas">
        <div class="canvas__pane">
          <div class="canvas__inner" id="canvas-inner">
            <div class="canvas__timeflow-area">
              <div class="timeflow" id="timeflow"></div>
            </div>
          </div>
        </div>

        <!-- Bottom bar: главный horizontal scroll (year-scale + scrollbar внизу)
             + zoom. canvas-inner синхронизируется через transform в JS. -->
        <div class="canvas__bottom-bar">
          <div class="canvas__scroll" id="canvas-scroll">
            <div class="canvas__year-inner" id="canvas-year-inner">
              <div class="year-scale" id="year-scale"></div>
            </div>
          </div>

          <!-- Zoom controls — позиционируется над bottom-bar -->
          <div class="canvas__zoom">
            <div class="zoom">
              <button class="icon-btn icon-btn--pill" type="button" aria-label="Уменьшить" id="zoom-out">
                <svg viewBox="0 0 14 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 6C10.5523 6 11 6.4477 11 7C11 7.5523 10.5523 8 10 8H4C3.4477 8 3 7.5523 3 7C3 6.4477 3.4477 6 4 6H10Z"/>
                </svg>
              </button>
              <div class="zoom__track">
                <span class="zoom__tick" style="left: 0%"></span>
                <span class="zoom__tick" style="left: 25%"></span>
                <span class="zoom__tick" style="left: 50%"></span>
                <span class="zoom__tick" style="left: 75%"></span>
                <span class="zoom__tick" style="left: 100%"></span>
                <div class="zoom__thumb" style="left: 50%"></div>
              </div>
              <button class="icon-btn icon-btn--pill" type="button" aria-label="Увеличить" id="zoom-in">
                <svg viewBox="0 0 14 14" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                  <path d="M10 6C10.5523 6 11 6.4477 11 7C11 7.5523 10.5523 8 10 8H4C3.4477 8 3 7.5523 3 7C3 6.4477 3.4477 6 4 6H10Z"/>
                  <path d="M8 4C8 3.4477 7.5523 3 7 3C6.4477 3 6 3.4477 6 4V10C6 10.5523 6.4477 11 7 11C7.5523 11 8 10.5523 8 10V4Z"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Current year overlay: вертикальная линия года под курсором +
             возрасты в пересечениях с life-line. Заполняется в JS
             (см. js/main.js → initYearHover, updateCurrentYear). -->
        <div class="current-year" id="current-year" hidden>
          <div class="current-year__line"></div>
        </div>

        <!-- Scroll hint: «shift + scroll» в левом нижнем углу. Появляется
             только когда у timeflow-area реально есть вертикальный скролл
             (см. js/main.js → updateScrollHint). -->
        <div class="scroll-hint" id="scroll-hint" hidden>
          <div class="scroll-hint__icon"></div>
          <span>shift + scroll</span>
        </div>
      </section>
    </main>

    <!-- Backdrop под попапом (затемнение) + сам popup-overlay (шторка). -->
    <div class="popup-backdrop" id="popup-backdrop"></div>
    <div class="popup-overlay" id="popup-overlay"></div>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
